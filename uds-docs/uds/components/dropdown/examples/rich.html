<div class="udc-dropdown" style="max-width:360px;">
  <label class="udc-dropdown__label">Property<span class="udc-dropdown__required" aria-label="required">*</span></label>
  <div class="udc-dropdown__trigger" tabindex="0" role="combobox" aria-label="Property" aria-expanded="false" aria-haspopup="listbox">
    <span class="udc-dropdown__leading-icon"><span class="material-symbols-outlined">home_work</span></span>
    <span class="udc-dropdown__value">{{property.name}}</span>
    <span class="udc-dropdown__chevron"><span class="material-symbols-outlined">keyboard_arrow_down</span></span>
  </div>
  <div class="udc-dropdown__list" role="listbox">
    <div class="udc-dropdown__item" role="option" aria-selected="true">{{property.name}}</div>
    <div class="udc-dropdown__item" role="option">Sunnyvale Towers</div>
    <div class="udc-dropdown__item" role="option">Cedar Hills</div>
    <div class="udc-dropdown__item" role="option">Oakwood Gardens</div>
  </div>
  <div class="udc-dropdown__helper">
    <span>Pick the property this lease applies to.</span>
    <span class="udc-dropdown__counter">1 of 17</span>
  </div>
</div>
