name: UDS Audits

# Runs on every PR + every push to main. Fails the check if any audit
# script exits non-zero. Catches drift between the per-component folders
# and what the docs site/Demo Builder actually consume.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  audits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Component completeness
        run: bash scripts/audit-component-completeness.sh

      - name: Demo Builder coverage
        run: bash scripts/audit-demo-coverage.sh

      - name: Placeholder vocabulary
        run: bash scripts/audit-placeholders.sh

      - name: Token-first CSS
        run: bash scripts/audit-token-usage.sh

      # Round-trip checks — these compare against /tmp/baseline-data which
      # only exists in the cloud agent VM. Skip in CI but keep the script
      # available for human runs. (Round-trip drift is caught by the four
      # audits above plus the per-component schema validation.)
