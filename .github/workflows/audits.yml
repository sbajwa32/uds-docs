name: UDS Audits

# Runs on every PR + every push to main. Fails the check if any audit
# script exits non-zero. Catches drift between the per-component folders
# and what the docs site/Demo Builder actually consume.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Detect whether this PR/push touched any file that can plausibly affect
  # rendered contrast on the seven pages the theme-contrast audit visits
  # (#/changelog, #/about, #/button, #/data-table, #/nav-header,
  # #/semantic-colors, ?uds=0.2#/changelog). The contrast audit is the
  # slowest job in this workflow (Chrome + 42 page navigations across 6
  # themes), and the vast majority of PRs land in paths that cannot shift
  # a contrast ratio — site-changelog text, .cursor/ rules, AGENTS.md,
  # version.txt, schemas, manifest JSON. Those PRs skip the contrast job
  # via the `theme-contrast` job's `if:` gate below. The static `audits`
  # job is unaffected and runs on every PR + push.
  changes:
    runs-on: ubuntu-latest
    outputs:
      contrast: ${{ steps.filter.outputs.contrast }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect contrast-affecting paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            contrast:
              # Token CSS — drives every rendered color
              - 'uds-docs/uds/tokens/**'
              # All component artifacts (CSS, examples, spec, impl, playground, JS) —
              # render into the audited Button / Data Table / Nav Header pages and
              # indirectly into the About / Changelog pages via badges/statuses.
              - 'uds-docs/uds/components/**'
              # Master orchestrators that load tokens + components
              - 'uds-docs/uds/uds.css'
              - 'uds-docs/uds/uds.js'
              # Site rendering layer — chrome CSS, SPA renderers, theme switcher,
              # page partials. Any of these can shift what's in the DOM or what
              # foreground/background classes get applied.
              - 'uds-docs/docs/site.css'
              - 'uds-docs/docs/app.js'
              - 'uds-docs/docs/modules/**'
              - 'uds-docs/docs/helpers/**'
              - 'uds-docs/docs/pages/**'
              # SPA shell — sidebar, data-page placeholders, theme switcher init,
              # initial data-theme attribute
              - 'uds-docs/index.html'
              # Archived snapshot loaded by the archive-changelog test
              - 'uds-docs/versions/**'
              # The audit script and its host workflow itself
              - 'scripts/audit-theme-contrast.sh'
              - 'scripts/lib/audit_theme_contrast.js'
              - '.github/workflows/audits.yml'

  audits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # `audit-toolchain-currency.sh` calls `git log -1 -- <file>` to find
          # each rule/skill/agent file's actual last-commit date. The default
          # shallow clone (depth 1) only knows about the head commit, which
          # makes `git log -1 -- <any file>` return the head commit's date
          # regardless of whether that commit touched the file — flagging
          # every file as stale. Fetch full history so the audit can compute
          # real mtimes.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Component completeness
        run: bash scripts/audit-component-completeness.sh

      - name: Demo Builder coverage
        run: bash scripts/audit-demo-coverage.sh

      - name: Placeholder vocabulary
        run: bash scripts/audit-placeholders.sh

      - name: Token-first CSS
        run: bash scripts/audit-token-usage.sh

      # PR2 — agent-toolchain refresh audits. These catch the failure modes
      # the nav-header sync demonstrated: per-component changelog left stale,
      # aggregated CHANGELOG not re-aggregated, Figma sync-state snapshot
      # diverged from spec.json, Code-tab API table drifted from CSS. The
      # first runs may pass via baseline grandfathering (see
      # scripts/audit-baseline.json); new drift after merge fails CI.
      - name: Changelog currency
        run: bash scripts/audit-changelog-currency.sh

      - name: Aggregate currency
        run: bash scripts/audit-aggregate-currency.sh

      - name: Figma sync-state currency
        run: bash scripts/audit-figma-sync-state-currency.sh

      - name: CSS API table consistency
        run: bash scripts/audit-css-api-table.sh

      - name: Doc-internal consistency
        run: bash scripts/audit-doc-internal-consistency.sh

      - name: Agent toolchain docs currency
        run: bash scripts/audit-agent-docs-currency.sh

      - name: Toolchain currency (lastUpdated + TOOLCHAIN.md)
        run: bash scripts/audit-toolchain-currency.sh

      - name: Figma card template recipe currency
        run: bash scripts/audit-figma-card-template.sh

      # Round-trip checks — these compare against /tmp/baseline-data which
      # only exists in the cloud agent VM. Skip in CI but keep the script
      # available for human runs. (Round-trip drift is caught by the four
      # audits above plus the per-component schema validation.)

  theme-contrast:
    # Phase 17: multi-theme axe-core scan across all 6 supported theme
    # combinations. Fails if any color-contrast, aria-allowed-attr, or
    # aria-required-children violations exist on the representative page
    # set. Heavier than the static audits (needs Node + Chrome) so it runs
    # in its own job for parallelism.
    #
    # Gated on the `changes` job's path filter: skips when the PR/push
    # only touches files that cannot affect rendered contrast (changelog
    # text, .cursor/ rules, version.txt, manifest JSON, etc.). See the
    # `changes` job above for the full include list.
    needs: changes
    if: needs.changes.outputs.contrast == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install audit deps
        run: npm install --no-save axe-core ws

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Start docs server
        run: |
          cd uds-docs
          python3 -m http.server 4000 &
          sleep 2

      - name: Start headless Chrome
        run: |
          mkdir -p /tmp/cdp-ci
          google-chrome \
            --headless --disable-gpu --no-sandbox \
            --user-data-dir=/tmp/cdp-ci \
            --remote-debugging-port=9332 \
            --disable-application-cache \
            --window-size=1280,1600 \
            "http://localhost:4000/" &
          sleep 6

      - name: Multi-theme contrast audit
        run: bash scripts/audit-theme-contrast.sh
